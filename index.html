<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mini VJ · Pexels 自动拉片</title>
<style>
  :root{--bg:#06070b;--panel:#0e0f18;--panel2:#13141f;--line:#1d2030;
        --ink:#eaf2ff;--dim:#56607a;--hud:#8fc4ff;--tap:46px;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  html,body{height:100%;background:var(--bg);overflow:hidden;overscroll-behavior:none;touch-action:manipulation;}
  body{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;color:var(--ink);display:flex;flex-direction:column;
       padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  .hud{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);
       background:var(--panel);font-size:11px;letter-spacing:.12em;text-transform:uppercase;flex-shrink:0;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--dim);transition:.1s;}
  .dot.live{background:#ff3b6b;box-shadow:0 0 12px 2px rgba(255,59,107,.7);}
  .hud .title{font-weight:600;} .hud .right{margin-left:auto;display:flex;gap:18px;}
  .stat{display:flex;flex-direction:column;align-items:flex-end;line-height:1.2;}
  .stat b{color:var(--hud);font-size:15px;} .stat span{color:var(--dim);font-size:9px;}
  .body{flex:1;display:flex;min-height:0;}
  .stage{flex:1;position:relative;min-width:0;background:#000;}
  #out{width:100%;height:100%;display:block;}
  .styleTag{position:absolute;left:14px;bottom:12px;z-index:3;font-size:10px;letter-spacing:.14em;
            text-transform:uppercase;color:var(--dim);pointer-events:none;line-height:1.6;}
  .styleTag b{color:var(--ink);}
  .credit{position:absolute;right:12px;bottom:10px;z-index:3;font-size:9px;color:var(--dim);}
  .credit a{color:var(--dim);}
  .fsExit{position:absolute;top:14px;right:14px;z-index:10;display:none;width:var(--tap);height:var(--tap);
          border-radius:50%;background:rgba(0,0,0,.5);border:1px solid var(--line);color:#fff;font-size:20px;
          cursor:pointer;align-items:center;justify-content:center;}
  /* pexels panel */
  .pex{position:absolute;top:0;left:0;right:0;z-index:8;background:rgba(10,12,20,.97);
       border-bottom:1px solid var(--line);padding:14px 16px;display:none;flex-direction:column;gap:10px;}
  .pex.show{display:flex;}
  .pex .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .pex input[type=text]{flex:1;min-width:140px;font-family:inherit;font-size:13px;color:var(--ink);
       background:var(--panel2);border:1px solid var(--line);border-radius:3px;padding:0 12px;height:var(--tap);}
  .pex .lab{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
  .chip{font-family:inherit;font-size:11px;color:var(--dim);background:var(--panel2);border:1px solid var(--line);
        border-radius:14px;padding:7px 13px;cursor:pointer;}
  .chip.on{color:var(--bg);background:var(--hud);border-color:var(--hud);}
  .pexstat{font-size:11px;color:var(--hud);min-height:14px;}
  .pexnote{font-size:10px;color:var(--dim);line-height:1.6;}
  .pexnote a{color:var(--hud);}
  /* bin */
  .bin{width:160px;flex-shrink:0;border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;}
  .bin h2{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);padding:12px 14px 6px;}
  .clips{flex:1;overflow-y:auto;padding:0 10px 10px;display:flex;flex-direction:column;gap:8px;}
  .clip{position:relative;aspect-ratio:16/9;border:2px solid var(--line);border-radius:4px;overflow:hidden;background:#000;flex-shrink:0;}
  .clip canvas{width:100%;height:100%;object-fit:cover;display:block;}
  .clip.active{border-color:var(--hud);}
  .clip .num{position:absolute;top:3px;left:6px;font-size:11px;color:#fff;text-shadow:0 1px 3px #000;}
  .addclip{font-family:inherit;font-size:11px;letter-spacing:.06em;color:var(--ink);background:var(--panel2);
           border:1px dashed var(--line);border-radius:4px;min-height:var(--tap);cursor:pointer;text-transform:uppercase;flex-shrink:0;}
  .veil{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:16px;padding:24px;text-align:center;z-index:5;background:radial-gradient(120% 120% at 50% 35%,rgba(143,196,255,.07),var(--bg) 60%);}
  .veil h1{font-size:12px;letter-spacing:.34em;color:var(--hud);text-transform:uppercase;}
  .veil p{font-size:13px;line-height:1.8;color:var(--dim);max-width:440px;}
  .veil .warn{color:#ffcf5c;font-size:12px;line-height:1.7;max-width:440px;}
  .vbtns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
  .go{font-family:inherit;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--bg);
      background:var(--hud);border:none;border-radius:3px;min-height:var(--tap);padding:0 24px;cursor:pointer;box-shadow:0 0 24px rgba(143,196,255,.3);}
  .go.ghost{background:transparent;color:var(--dim);border:1px solid var(--line);box-shadow:none;}
  .console{border-top:1px solid var(--line);background:var(--panel);flex-shrink:0;display:flex;flex-wrap:wrap;
           align-items:center;gap:8px 12px;padding:10px 14px;}
  .grp{display:flex;align-items:center;gap:8px;}
  .lab{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);white-space:nowrap;}
  .tog,.btn{font-family:inherit;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border-radius:3px;
       min-height:var(--tap);padding:0 13px;cursor:pointer;display:flex;align-items:center;}
  .tog{color:var(--dim);background:var(--panel2);border:1px solid var(--line);}
  .tog.on{color:var(--bg);background:var(--hud);border-color:var(--hud);}
  .btn{color:var(--ink);background:transparent;border:1px solid var(--line);}
  .btn.accent{border-color:var(--hud);color:var(--hud);}
  input[type=range]{-webkit-appearance:none;appearance:none;width:84px;height:4px;background:var(--line);border-radius:4px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--hud);cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:22px;height:22px;border:none;border-radius:50%;background:var(--hud);}
  .sep{width:1px;height:22px;background:var(--line);}
  .hidden{display:none!important;}
  @media (max-width:860px){
    .body{flex-direction:column-reverse;}
    .bin{width:100%;border-right:none;border-top:1px solid var(--line);max-height:124px;}
    .bin h2{display:none;}
    .clips{flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:10px;align-items:center;}
    .clip{height:80px;width:auto;} .clip canvas{width:auto;height:100%;}
    .addclip{min-width:90px;height:80px;}
    .console{justify-content:center;} .sep,.lab,.hud .title{display:none;}
  }
  body.fs .hud,body.fs .bin,body.fs .console{display:none;}
  body.fs .stage{position:fixed;inset:0;z-index:900;}
  body.fs .fsExit{display:flex;} body.fs .styleTag,body.fs .credit{display:none;}
</style>
</head>
<body>
<div class="hud">
  <div class="dot" id="dot"></div><span class="title">Mini VJ</span>
  <div class="right">
    <div class="stat"><b id="src">—</b><span>音源</span></div>
    <div class="stat"><b id="bpm">--</b><span>bpm</span></div>
    <div class="stat"><b id="lvl">0</b><span>低音</span></div>
  </div>
</div>
<div class="body">
  <aside class="bin"><h2>片源</h2><div class="clips" id="clips"><button class="addclip" id="add">+ 本地视频</button></div></aside>
  <div class="stage" id="stage">
    <canvas id="out"></canvas>

    <div class="pex" id="pex">
      <div class="row">
        <span class="lab">API Key</span>
        <input type="text" id="pkey" placeholder="粘贴你的 Pexels API Key（pexels.com/api 免费申请）">
      </div>
      <div class="row">
        <span class="lab">关键词</span>
        <input type="text" id="pkw" placeholder="abstract dark neon" value="abstract dark neon">
        <button class="btn accent" id="pfetch">拉取</button>
      </div>
      <div class="row" id="chips"></div>
      <div class="row">
        <span class="lab">方向</span>
        <button class="tog on" id="pland">横屏</button>
        <button class="tog" id="pport">竖屏</button>
        <span class="sep"></span>
        <button class="tog" id="pauto">每 40 秒换新一批</button>
        <button class="btn" id="pclear">清空拉取</button>
        <span class="sep"></span>
        <button class="btn" id="pclose">收起</button>
      </div>
      <div class="pexstat" id="pexstat"></div>
      <div class="pexnote">视频由 <a href="https://www.pexels.com" target="_blank">Pexels</a> 提供 · Key 只发往 Pexels,不保存。本地打开若拉取失败,请用 https 部署后打开。</div>
    </div>

    <div class="styleTag"><b id="sceneName">隧道</b> · <span id="fxList">跳动 频闪</span><br><span style="color:var(--dim)">点画面 = 切下一个</span></div>
    <div class="credit"><a href="https://www.pexels.com" target="_blank">Videos by Pexels</a></div>
    <button class="fsExit" id="fsExit">×</button>
    <div class="veil" id="veil">
      <h1>Audio Reactive · Pexels</h1>
      <p>内置 5 个生成场景,可再用 Pexels 自动拉真实视频混播。<br>先选音源开始,再点底部「Pexels」拉片。</p>
      <div class="vbtns">
        <button class="go" id="goMic">现场麦克风</button>
        <button class="go ghost" id="goFile">用音乐文件驱动</button>
      </div>
      <p class="warn" id="warn"></p>
    </div>
  </div>
</div>
<div class="console">
  <button class="btn accent" id="pexBtn">Pexels 拉片</button>
  <div class="sep"></div>
  <div class="grp"><span class="lab">自动换片</span><button class="tog on" data-fx="autoswitch">自动</button></div>
  <button class="tog on" data-fx="punch">跳动</button>
  <button class="tog on" data-fx="strobe">频闪</button>
  <button class="tog" data-fx="hue">色相</button>
  <button class="tog" data-fx="ghost">残影</button>
  <button class="tog" data-fx="mirror">镜像</button>
  <div class="sep"></div>
  <div class="grp"><span class="lab">灵敏度</span><input type="range" id="sens" min="1.05" max="1.9" step="0.01" value="1.32"></div>
  <div class="grp"><span class="lab">间隔</span><input type="range" id="interval" min="2" max="32" step="2" value="8"></div>
  <div class="sep"></div>
  <button class="btn" id="full">全屏输出</button>
</div>
<input type="file" id="vfile" accept="video/*" multiple class="hidden">
<input type="file" id="afile" accept="audio/*,video/*" class="hidden">
<audio id="audioEl" loop crossorigin="anonymous"></audio>
<script>
(()=>{
  const out=document.getElementById('out'),ctx=out.getContext('2d',{alpha:false});
  const off=document.createElement('canvas'),octx=off.getContext('2d');
  const dot=document.getElementById('dot');
  const bpmEl=document.getElementById('bpm'),lvlEl=document.getElementById('lvl'),srcEl=document.getElementById('src');
  const veil=document.getElementById('veil'),warn=document.getElementById('warn');
  const clipsBox=document.getElementById('clips'),addBtn=document.getElementById('add');
  const sensEl=document.getElementById('sens'),intervalEl=document.getElementById('interval');
  const fxListEl=document.getElementById('fxList'),sceneNameEl=document.getElementById('sceneName'),stage=document.getElementById('stage');

  let W,H,DPR,started=false,DT=0,prevT=0;
  const sources=[]; let activeClip=-1;
  const fx={autoswitch:true,punch:true,strobe:true,hue:false,ghost:false,mirror:false};

  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=out.clientWidth;H=out.clientHeight;
    out.width=W*DPR;out.height=H*DPR;off.width=W*DPR;off.height=H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);octx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);addEventListener('orientationchange',()=>setTimeout(resize,300));

  function refreshFx(){const map={punch:'跳动',strobe:'频闪',hue:'色相',ghost:'残影',mirror:'镜像'};
    const on=Object.keys(fx).filter(k=>fx[k]&&k!=='autoswitch');fxListEl.textContent=on.length?on.map(k=>map[k]).join(' '):'无';}
  document.querySelectorAll('.tog[data-fx]').forEach(b=>{b.onclick=()=>{const k=b.dataset.fx;fx[k]=!fx[k];b.classList.toggle('on',fx[k]);refreshFx();};});

  // ---------- audio ----------
  let actx,analyser,freq,audioNode;
  function mkAnalyser(){analyser=actx.createAnalyser();analyser.fftSize=1024;analyser.smoothingTimeConstant=0.55;freq=new Uint8Array(analyser.frequencyBinCount);}
  async function startMic(){try{actx=new (window.AudioContext||window.webkitAudioContext)();
    const s=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    mkAnalyser();actx.createMediaStreamSource(s).connect(analyser);srcEl.textContent='麦克风';begin();
  }catch(err){warn.textContent='⚠ 这台设备不允许从本地文件用麦克风。请用 https 部署后打开,或先用「用音乐文件驱动」。';}}
  document.getElementById('goFile').onclick=()=>document.getElementById('afile').click();
  document.getElementById('afile').onchange=e=>{const f=e.target.files[0];if(!f)return;
    const a=document.getElementById('audioEl');a.src=URL.createObjectURL(f);
    if(!actx){actx=new (window.AudioContext||window.webkitAudioContext)();mkAnalyser();
      audioNode=actx.createMediaElementSource(a);audioNode.connect(analyser);analyser.connect(actx.destination);}
    actx.resume?.();a.play();srcEl.textContent='音乐文件';begin();};
  document.getElementById('goMic').onclick=startMic;
  function begin(){if(started)return;started=true;resize();prevT=performance.now();veil.style.display='none';requestAnimationFrame(loop);}

  // ---------- bin / sources ----------
  function addClipEl(){const el=document.createElement('div');el.className='clip';
    const tc=document.createElement('canvas');tc.width=160;tc.height=90;
    const num=document.createElement('span');num.className='num';
    el.appendChild(tc);el.appendChild(num);clipsBox.insertBefore(el,addBtn);
    return {el,tc,tctx:tc.getContext('2d'),num};}
  function renumber(){sources.forEach((x,j)=>x.num.textContent=j+1);}
  function finalize(s){renumber();s.el.onclick=()=>setActive(sources.indexOf(s));if(activeClip<0)setActive(0);}
  function setActive(i){if(i<0||i>=sources.length)return;activeClip=i;
    sources.forEach((c,j)=>{c.el.classList.toggle('active',j===i);
      if(c.type==='video'){j===i?c.video.play().catch(()=>{}):c.video.pause();}});
    sceneNameEl.textContent=sources[i].name;}
  function removeSource(s){const i=sources.indexOf(s);if(i<0)return;
    if(s.type==='video'){s.video.pause();if(s.objURL)URL.revokeObjectURL(s.objURL);s.video.removeAttribute('src');try{s.video.load();}catch(e){}}
    s.el.remove();sources.splice(i,1);renumber();
    if(sources.length===0){activeClip=-1;return;}
    if(activeClip>=sources.length)activeClip=sources.length-1;setActive(Math.max(0,activeClip));}

  function paintSceneThumb(c,name){c.fillStyle='#0a0e18';c.fillRect(0,0,160,90);
    c.strokeStyle='#2a3650';c.lineWidth=2;c.strokeRect(6,6,148,78);
    c.fillStyle='#8fc4ff';c.font='bold 16px monospace';c.textAlign='center';c.textBaseline='middle';c.fillText(name,80,45);}
  function addScene(sc){const ui=addClipEl();paintSceneThumb(ui.tctx,sc.name);
    sources.push({type:'scene',name:sc.name,draw:sc.draw,...ui});finalize(sources[sources.length-1]);}

  document.getElementById('vfile').onchange=e=>{[...e.target.files].forEach(f=>addSourceVideo({objURL:URL.createObjectURL(f),name:'本地'}));e.target.value='';};
  addBtn.onclick=()=>document.getElementById('vfile').click();
  function addSourceVideo({url,objURL,name,isPexels}){const v=document.createElement('video');
    v.src=url||objURL;v.loop=true;v.muted=true;v.playsInline=true;v.setAttribute('playsinline','');v.preload='metadata';
    const ui=addClipEl();const s={type:'video',name:name||'视频',video:v,objURL,isPexels:!!isPexels,...ui};
    sources.push(s);finalize(s);
    if(sources.indexOf(s)!==activeClip)v.pause();
    v.addEventListener('loadeddata',()=>{if(started&&sources.indexOf(s)===activeClip)v.play().catch(()=>{});});}

  // ---------- Pexels ----------
  const pex=document.getElementById('pex'),pexstat=document.getElementById('pexstat');
  const pkey=document.getElementById('pkey'),pkw=document.getElementById('pkw');
  let orient='landscape',pexPage=1,autoTimer=null;
  document.getElementById('pexBtn').onclick=()=>pex.classList.toggle('show');
  document.getElementById('pclose').onclick=()=>pex.classList.remove('show');
  document.getElementById('pland').onclick=function(){orient='landscape';this.classList.add('on');document.getElementById('pport').classList.remove('on');};
  document.getElementById('pport').onclick=function(){orient='portrait';this.classList.add('on');document.getElementById('pland').classList.remove('on');};
  ['abstract dark','neon glow','sci-fi','particles','smoke ink','city night','liquid metal','laser'].forEach(k=>{
    const c=document.createElement('button');c.className='chip';c.textContent=k;
    c.onclick=()=>{pkw.value=k;fetchPexels();};document.getElementById('chips').appendChild(c);});
  document.getElementById('pfetch').onclick=fetchPexels;
  document.getElementById('pclear').onclick=()=>{clearPulled();pexstat.textContent='已清空拉取的视频';};
  document.getElementById('pauto').onclick=function(){
    if(autoTimer){clearInterval(autoTimer);autoTimer=null;this.classList.remove('on');}
    else{this.classList.add('on');autoTimer=setInterval(fetchPexels,40000);}};
  function clearPulled(){sources.filter(s=>s.isPexels).slice().forEach(removeSource);}
  function pickFile(files){const mp4=files.filter(f=>f.file_type==='video/mp4');const pool=(mp4.length?mp4:files).slice();
    pool.sort((a,b)=>a.width-b.width);return pool.find(f=>f.width>=640&&f.width<=1920)||pool[Math.floor(pool.length/2)]||pool[0];}
  async function fetchPexels(){
    const key=pkey.value.trim();if(!key){pexstat.textContent='请先填入 API Key';return;}
    const q=encodeURIComponent(pkw.value.trim()||'abstract');
    const url=`https://api.pexels.com/videos/search?query=${q}&per_page=8&orientation=${orient}&size=medium&page=${pexPage}`;
    pexstat.textContent='拉取中…';
    try{const r=await fetch(url,{headers:{Authorization:key}});
      if(!r.ok){pexstat.textContent='失败:'+r.status+(r.status===401?'(Key 无效)':r.status===429?'(超出额度)':'');return;}
      const data=await r.json();
      if(!data.videos||!data.videos.length){pexstat.textContent='没有结果,换个关键词';return;}
      pexPage=pexPage>=10?1:pexPage+1;
      clearPulled();
      let n=0;data.videos.forEach(v=>{const f=pickFile(v.video_files||[]);if(f){addSourceVideo({url:f.link,name:'PX',isPexels:true});n++;}});
      pexstat.textContent=`已加入 ${n} 段「${pkw.value.trim()}」· 自动轮播中`;
    }catch(e){pexstat.textContent='网络/跨域被拦截。本地打开常见,请用 https 部署后再打开。';}}

  // ---------- generative scenes ----------
  const SPH=[];(function(){const n=720,o=2/n,inc=Math.PI*(3-Math.sqrt(5));
    for(let i=0;i<n;i++){const y=i*o-1+o/2,r=Math.sqrt(1-y*y),phi=i*inc;SPH.push({x:Math.cos(phi)*r,y,z:Math.sin(phi)*r});}})();
  const S={tnl:0,terr:0,yaw:0,mono:0,exp:0};
  function drawTunnel(g,t,bass,pulse){const f=Math.min(W,H),cx=W/2,cy=H/2,N=24,gap=160;
    S.tnl+=(50+bass*340+pulse*260)*DT;g.lineWidth=Math.max(1,f*0.004);
    for(let i=N;i>=0;i--){let d=i*gap-(S.tnl%gap);if(d<=4)continue;const sc=f/d,half=sc*f*0.9,a=Math.max(0,1-d/(N*gap));
      g.strokeStyle=`rgba(150,200,255,${a*0.9})`;g.shadowColor='#8fc4ff';g.shadowBlur=Math.min(18,sc*6);
      g.save();g.translate(cx,cy);g.rotate(d*0.004+t*0.0003);g.strokeRect(-half,-half,half*2,half*2);g.restore();}
    g.shadowBlur=0;g.fillStyle='#eaf2ff';g.beginPath();g.arc(cx,cy,3+bass*12,0,6.28);g.fill();}
  function drawSphere(g,t,bass,pulse){const cx=W/2,cy=H/2,R=Math.min(W,H)*0.34,f=Math.min(W,H),D=R*3;
    S.yaw+=(0.25+bass*1.1)*DT;if(pulse>0.6)S.exp=1;S.exp*=0.9;
    const cyw=Math.cos(S.yaw),syw=Math.sin(S.yaw),cx2=Math.cos(0.45),sx2=Math.sin(0.45);g.fillStyle='#eaf2ff';
    for(let k=0;k<SPH.length;k++){const p=SPH[k];let X=p.x*cyw+p.z*syw,Z=-p.x*syw+p.z*cyw,Y=p.y;
      let Y2=Y*cx2-Z*sx2,Z2=Y*sx2+Z*cx2;const rr=R*(1+S.exp*0.5+bass*0.12);X*=rr;Y2*=rr;Z2*=rr;
      const sc=f/(D-Z2);if(sc<=0)continue;const sx=cx+X*sc,sy=cy+Y2*sc,depth=(Z2/R+1)/2;
      g.globalAlpha=0.2+depth*0.8;const dot=sc*(0.7+depth*1.5);g.fillRect(sx,sy,dot,dot);}g.globalAlpha=1;}
  function drawMask(g,t,bass,pulse){const cx=W/2,cy=H/2,hw=Math.min(W,H)*0.20,hh=Math.min(W,H)*0.30;
    g.lineWidth=Math.max(1.2,Math.min(W,H)*0.0035);
    function feat(ox,color,alpha){g.strokeStyle=color;g.globalAlpha=alpha;g.shadowColor=color;g.shadowBlur=10;g.save();g.translate(ox,0);
      g.beginPath();g.ellipse(cx,cy,hw,hh,0,0,6.28);g.stroke();
      for(let k=1;k<=3;k++){g.globalAlpha=alpha*0.35;g.beginPath();g.ellipse(cx,cy,hw*(1-k*0.18),hh*(1-k*0.12),0,0,6.28);g.stroke();}
      g.globalAlpha=alpha;const ey=cy-hh*0.12,ex=hw*0.42,look=Math.sin(t*0.0006)*hw*0.05;
      for(const s of[-1,1]){g.beginPath();g.ellipse(cx+s*ex,ey,hw*0.22,hh*0.10,0,0,6.28);g.stroke();
        g.beginPath();g.arc(cx+s*ex+look,ey,hw*0.06+bass*hw*0.08,0,6.28);g.stroke();}
      g.beginPath();g.moveTo(cx-hw*0.4,cy+hh*0.45);g.lineTo(cx+hw*0.4,cy+hh*0.45);g.stroke();
      g.globalAlpha=alpha*0.3;g.beginPath();g.moveTo(cx,cy-hh);g.lineTo(cx,cy+hh);g.stroke();g.restore();}
    const ch=pulse>0.4?pulse*6:0;if(ch){feat(-ch,'#7fb8ff',0.6);feat(ch,'#ffb27a',0.5);}feat(0,'#eaf2ff',0.95);
    g.shadowBlur=0;g.globalAlpha=1;const sy=cy-hh+((t*0.05)%(hh*2));g.strokeStyle='rgba(150,200,255,0.5)';
    g.beginPath();g.moveTo(cx-hw,sy);g.lineTo(cx+hw,sy);g.stroke();}
  function drawTerrain(g,t,bass,pulse){const cx=W/2,cy=H/2,f=Math.min(W,H),ROWS=26,COLS=28,gap=70;
    S.terr+=(40+bass*220)*DT;g.lineWidth=1;
    for(let r=ROWS;r>=1;r--){let z=r*gap-(S.terr%gap);if(z<2)continue;const sc=f/z,a=Math.max(0,1-z/(ROWS*gap));
      g.strokeStyle=`rgba(150,200,255,${a*0.8})`;g.beginPath();
      for(let c=0;c<=COLS;c++){const fv=freq[Math.floor(c/COLS*180)+2]/255,wx=(c/COLS-0.5)*W*1.6,elev=fv*180*(0.4+a);
        const sx=cx+wx*sc,sy=cy+(140-elev)*sc+sc*30;c===0?g.moveTo(sx,sy):g.lineTo(sx,sy);}g.stroke();}}
  function drawMonolith(g,t,bass,pulse){const cx=W/2,cy=H/2,f=Math.min(W,H),D=420;
    S.mono+=(0.2+bass*0.5)*DT;const w=f*0.10,h=f*0.42,dp=w,pn=1+pulse*0.12;
    const V=[[-w,-h,-dp],[w,-h,-dp],[w,h,-dp],[-w,h,-dp],[-w,-h,dp],[w,-h,dp],[w,h,dp],[-w,h,dp]];
    const cw=Math.cos(S.mono),sw=Math.sin(S.mono);
    const P=V.map(([x,y,z])=>{let X=x*cw+z*sw,Z=-x*sw+z*cw;X*=pn;const sc=f/(D-Z);return[cx+X*sc,cy+y*pn*sc];});
    const E=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
    g.fillStyle='rgba(150,200,255,0.4)';for(let i=0;i<60;i++)g.fillRect((i*73.3)%W,(i*131.7)%H,1.5,1.5);
    g.lineWidth=Math.max(1.5,f*0.004);g.strokeStyle='#eaf2ff';g.shadowColor='#8fc4ff';g.shadowBlur=12+pulse*20;
    g.beginPath();for(const[a,b]of E){g.moveTo(P[a][0],P[a][1]);g.lineTo(P[b][0],P[b][1]);}g.stroke();g.shadowBlur=0;}
  [{name:'隧道',draw:drawTunnel},{name:'粒子球',draw:drawSphere},{name:'面具',draw:drawMask},
   {name:'地形',draw:drawTerrain},{name:'巨石',draw:drawMonolith}].forEach(addScene);
  refreshFx();

  // ---------- beat + render ----------
  let bassAvg=0,pulse=0,lastBeat=0,beatCount=0,hueShift=0;const beatTimes=[];
  function loop(t){requestAnimationFrame(loop);DT=Math.min(0.05,(t-prevT)/1000)||0;prevT=t;
    analyser.getByteFrequencyData(freq);let bass=0;for(let i=1;i<10;i++)bass+=freq[i];bass/=9*255;
    bassAvg=bassAvg*0.94+bass*0.06;const sens=parseFloat(sensEl.value);
    if(bass>bassAvg*sens&&bass>0.1&&t-lastBeat>240){lastBeat=t;pulse=1;beatCount++;
      beatTimes.push(t);if(beatTimes.length>8)beatTimes.shift();
      if(beatTimes.length>1){let d=0;for(let i=1;i<beatTimes.length;i++)d+=beatTimes[i]-beatTimes[i-1];
        const b=Math.round(60000/(d/(beatTimes.length-1)));if(b>50&&b<220)bpmEl.textContent=b;}
      if(fx.autoswitch&&sources.length>1&&beatCount%(+intervalEl.value)===0)setActive((activeClip+1)%sources.length);
      if(fx.hue)hueShift=(Math.random()*360)|0;dot.classList.add('live');setTimeout(()=>dot.classList.remove('live'),80);}
    pulse*=0.9;lvlEl.textContent=Math.round(bass*100);render(bass,pulse,t);
    const s=sources[activeClip];if(s&&s.type==='video'&&s.video.readyState>=2)s.tctx.drawImage(s.video,0,0,160,90);}
  function coverInto(g,v){const vr=v.videoWidth/v.videoHeight||16/9,cr=W/H;let dw,dh;
    if(vr>cr){dh=H;dw=H*vr;}else{dw=W;dh=W/vr;}g.drawImage(v,(W-dw)/2,(H-dh)/2,dw,dh);}
  function render(bass,pulse,t){
    octx.setTransform(DPR,0,0,DPR,0,0);octx.globalAlpha=1;octx.globalCompositeOperation='source-over';
    octx.fillStyle='#000';octx.fillRect(0,0,W,H);const s=sources[activeClip];
    if(s&&s.type==='video'){if(s.video.readyState>=2)coverInto(octx,s.video);}
    else if(s&&s.type==='scene')s.draw(octx,t,bass,pulse);
    ctx.setTransform(DPR,0,0,DPR,0,0);ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);const scale=1+(fx.punch?pulse*0.16:0)+bass*0.03;
    ctx.filter=fx.hue?`hue-rotate(${(hueShift*pulse)|0}deg)`:'none';
    if(fx.mirror){ctx.drawImage(off,0,0,off.width/2,off.height,0,0,W/2,H);
      ctx.save();ctx.translate(W,0);ctx.scale(-1,1);ctx.drawImage(off,0,0,off.width/2,off.height,0,0,W/2,H);ctx.restore();}
    else{const dw=W*scale,dh=H*scale;ctx.drawImage(off,0,0,off.width,off.height,(W-dw)/2,(H-dh)/2,dw,dh);}
    ctx.filter='none';
    if(fx.ghost&&bass>0.16){const o=bass*22*pulse;ctx.globalCompositeOperation='lighter';ctx.globalAlpha=.3;
      ctx.filter='hue-rotate(140deg)';ctx.drawImage(off,0,0,off.width,off.height,o,0,W,H);
      ctx.filter='hue-rotate(-70deg)';ctx.drawImage(off,0,0,off.width,off.height,-o,0,W,H);
      ctx.filter='none';ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';}
    if(fx.strobe&&pulse>0.55){ctx.fillStyle='#fff';ctx.globalAlpha=(pulse-0.55)*1.5;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}}
  stage.addEventListener('click',e=>{if(e.target.closest('.pex')||e.target.id==='fsExit'||veil.style.display!=='none')return;
    if(sources.length>1)setActive((activeClip+1)%sources.length);});
  document.getElementById('full').onclick=()=>{document.body.classList.add('fs');setTimeout(resize,100);};
  document.getElementById('fsExit').onclick=()=>{document.body.classList.remove('fs');setTimeout(resize,100);};
  document.addEventListener('visibilitychange',()=>{if(actx)document.hidden?actx.suspend?.():actx.resume?.();});
})();
</script>
</body>
</html>
